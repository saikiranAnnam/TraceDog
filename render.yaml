services:
  - type: web
    name: tracedog-api
    runtime: docker
    rootDir: backend
    plan: starter
    autoDeployTrigger: commit
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tracedog-postgres
          property: connectionString
      - key: DEBUG
        value: "false"
      - key: SIMILARITY_BACKEND
        value: "tfidf"

databases:
  - name: tracedog-postgres
    plan: free
