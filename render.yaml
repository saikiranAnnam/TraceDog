services:
  - type: web
    name: tracedog-api
    runtime: docker
    rootDir: backend
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: starter
    autoDeployTrigger: commit
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tracedog-postgres
          property: connectionString
      - key: DEBUG
        value: "false"
      - key: SIMILARITY_BACKEND
        value: "tfidf"
      - key: ADMIN_API_KEY
        sync: false
      - key: CORS_ALLOW_ORIGINS
        sync: false

databases:
  - name: tracedog-postgres
    plan: free
