# TraceDog CI — backend tests, dashboard build, Docker validation
name: TraceDog CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  backend-test:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        env:
          PYTHONPATH: .
        run: |
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing --junitxml=junit.xml

      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v4
        if: hashFiles('backend/coverage.xml') != ''
        continue-on-error: true
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: |
            backend/junit.xml
            backend/coverage.xml
          if-no-files-found: ignore

  dashboard-build:
    name: Dashboard (Next.js build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          # Use a path that always exists; `package-lock.json` may not be committed yet.
          cache-dependency-path: dashboard/package.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

  eval-hf-pins:
    name: Evaluation (HF dataset revision pins)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install eval dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r evaluation/requirements.txt

      - name: Verify pinned HF revisions load
        env:
          PYTHONPATH: .
          TOKENIZERS_PARALLELISM: "false"
          OMP_NUM_THREADS: "1"
        run: python evaluation/scripts/verify_hf_dataset_revisions.py

  docker-backend:
    name: Docker (API image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: tracedog-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
