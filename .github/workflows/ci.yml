# TraceDog CI — dashboard build, evaluation checks (API lives in TraceDog-backend)
name: TraceDog CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  dashboard-build:
    name: Dashboard (Next.js build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: dashboard/package.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

  eval-hf-pins:
    name: Evaluation (HF dataset revision pins)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install eval dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r evaluation/requirements.txt

      - name: Verify pinned HF revisions load
        env:
          PYTHONPATH: .
          TOKENIZERS_PARALLELISM: "false"
          OMP_NUM_THREADS: "1"
        run: python evaluation/scripts/verify_hf_dataset_revisions.py
